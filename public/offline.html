<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNLON — Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #060104;
      color: #FFF3EC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #FF5020, #FFD000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
    }
    .title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #FFF3EC;
    }
    .subtitle {
      font-size: 1rem;
      color: rgba(255, 243, 236, 0.6);
      margin-bottom: 2.5rem;
      max-width: 280px;
      line-height: 1.5;
    }
    .retry-btn {
      background: linear-gradient(135deg, #FF5020, #FFD000);
      color: #060104;
      border: none;
      padding: 0.875rem 2.5rem;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .retry-btn:hover {
      opacity: 0.9;
    }
    .retry-btn:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="logo">UNLON</div>
  <h1 class="title">You're offline</h1>
  <p class="subtitle">Check your connection and try again</p>
  <button class="retry-btn" onclick="location.reload()">Retry</button>
</body>
</html>
